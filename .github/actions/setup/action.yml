name: Setup PHP project
description:
  Sets up everything needed to run a standard PHP project.

inputs:
  php-version:
    description: PHP Version
    required: false
    default: 'pre-installed'
  composer-version:
    description: Composer Version
    required: false
    default: 'v2'

runs:
  using: composite
  steps:
    - name: Setup PHP ${{ inputs.php-version }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        tools: composer:${{ inputs.composer-version }}
        coverage: xdebug
        ini-values: zend.assertions=1

    - name: Validate Composer Config
      shell: bash
      #language=bash
      run: composer validate --strict

    - name: Cache Composer Packages
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ inputs.php-version }}-${{ hashFiles('composer.json') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ inputs.php-version }}-
          ${{ runner.os }}-php-

    - name: Install Composer Packages
      shell: bash
      #language=bash
      run: composer --no-interaction install --no-progress --prefer-dist --optimize-autoloader
