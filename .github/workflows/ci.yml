name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  coding-style:
    name: Coding Style
    uses: ./.github/workflows/coding-style.yml

  static-analysis:
    name: Static Analysis
    uses: ./.github/workflows/static-analysis.yml

  unit-tests:
    name: Unit Tests
    strategy:
      matrix:
        os: [ubuntu, windows]
      fail-fast: false
    uses: ./.github/workflows/unit-tests.yml
    with:
      os: ${{ matrix.os }}

  feature-tests:
    name: Feature Tests
    strategy:
      matrix:
        os: [ubuntu, windows]
      fail-fast: false
    uses: ./.github/workflows/feature-tests.yml
    with:
      os: ${{ matrix.os }}
